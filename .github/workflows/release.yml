name: Release native packages

# Publish the four packageable native extensions to their registries.
#
# Trigger:  push a version tag, e.g.  git tag v1.2.0 && git push origin v1.2.0
#           (or run manually from the Actions tab via workflow_dispatch).
#
# Each job is independent — a missing/invalid token fails only that registry,
# not the others. Every job re-vendors vibe.h and runs the package's own test
# before publishing, so a broken build never ships.
#
# Required repo secrets (Settings > Secrets and variables > Actions):
#   NPM_TOKEN             — npm automation token        (Node)
#   RUBYGEMS_API_KEY      — RubyGems API key             (Ruby)
#   CARGO_REGISTRY_TOKEN  — crates.io API token          (Rust)
# PyPI uses Trusted Publishing (OIDC) — no secret needed once the publisher is
# configured at https://pypi.org/manage/account/publishing/ for this repo +
# workflow + the "pypi" environment below.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # --- Python -> PyPI ------------------------------------------------------
  pypi:
    name: PyPI (vibe-lang)
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write            # OIDC for PyPI Trusted Publishing
    defaults:
      run:
        working-directory: bindings/native/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Vendor vibe.h
        run: ../vendor.sh
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Smoke-test the built wheel
        run: |
          python -m pip install dist/*.whl
          python -c 'import vibe; assert vibe("port 8080").port == 8080; print("wheel OK")'
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: bindings/native/python/dist/

  # --- Node -> npm ---------------------------------------------------------
  npm:
    name: npm (vibe-native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/native/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Vendor vibe.h
        run: ../vendor.sh
      - name: Build + test the addon
        run: |
          npm install --ignore-scripts
          npx node-gyp configure build
          node test.mjs
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # --- Ruby -> RubyGems ----------------------------------------------------
  rubygems:
    name: RubyGems (vibe-lang)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/native/ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Vendor vibe.h
        run: ../vendor.sh
      - name: Build + test the extension
        run: |
          ruby extconf.rb && make
          ruby test.rb
      - name: Build the gem
        run: gem build vibe-lang.gemspec
      - name: Publish to RubyGems
        run: |
          mkdir -p ~/.gem
          printf -- '---\n:rubygems_api_key: %s\n' "$RUBYGEMS_API_KEY" > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
          gem push vibe-lang-*.gem
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

  # --- Rust -> crates.io ---------------------------------------------------
  crates:
    name: crates.io (vibe-sys)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/native/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Vendor vibe.h
        run: ../vendor.sh
      - name: Test
        run: cargo test --lib
      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
